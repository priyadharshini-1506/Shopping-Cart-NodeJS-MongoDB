<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f4f4f4;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.container{
    background:white;
    width:380px;
    padding:45px;
    border-radius:14px;
    border:1px solid #e6e6e6;
    box-shadow:0 10px 25px rgba(0,0,0,0.06);
}

/* LOGO */
.logo{
    text-align:center;
    font-size:38px;
    margin-bottom:8px;
}

/* TITLE */
h2{
    text-align:center;
    color:#111;
    font-size:26px;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:13px;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:13px;
    margin-bottom:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#111;
}

/* BUTTON */
button{
    width:100%;
    padding:13px;
    background:#111;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:600;
    cursor:pointer;
}

button:hover{
    background:#000;
}

/* LINK */
a{
    display:block;
    text-align:center;
    margin-top:18px;
    color:#444;
    font-size:13px;
    text-decoration:none;
}

a:hover{
    color:#000;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">🛍️</div>

    <h2>Login</h2>
    <p class="subtitle">Welcome back to your account</p>

    <form action="/login" method="POST">

        <input type="email" name="email" placeholder="Email Address" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <a href="/register.html">New user? Create account</a>

</div>

</body>
</html>
