<!DOCTYPE html>
<html>
<head>
  <title>Register</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f7f7f7;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#111;
    }

    .container{
      width:380px;
      padding:35px;
      border-radius:8px;
      border:1px solid #ddd;
      background:#fff;
      text-align:center;
    }

    h2{
      font-size:22px;
      margin-bottom:10px;
      font-weight:600;
    }

    .subtext{
      font-size:13px;
      color:#666;
      margin-bottom:18px;
    }

    input{
      width:100%;
      padding:12px;
      margin:8px 0;
      border:1px solid #ddd;
      border-radius:6px;
      font-size:14px;
      outline:none;
    }

    input:focus{
      border-color:#ff9900;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:12px;
      background:#111;
      color:#fff;
      border:none;
      border-radius:6px;
      font-weight:600;
      cursor:pointer;
    }

    button:hover{
      background:#000;
    }

    a{
      display:block;
      margin-top:15px;
      color:#0066c0;
      text-decoration:none;
      font-size:14px;
    }

    a:hover{
      text-decoration:underline;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>Create Account</h2>

  <div class="subtext">
    Fast checkout • Secure payments • Trusted shopping experience
  </div>

  <form action="/register" method="POST">

    <input type="text" name="name" placeholder="Full Name" required>

    <input type="email" name="email" placeholder="Email Address" required>

    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Create Account</button>

  </form>

  <a href="/login.html">
    Already have an account? Sign in
  </a>

</div>

</body>
</html>
